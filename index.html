<body>
  <div class="container">
    <h1>🔍 CyberWarrior Phishing Detector</h1>
    <input id="url" placeholder="Enter URL (include http:// or https://)" />
    <button id="checkBtn"><i class="fas fa-search"></i> Check URL</button>
    <div id="result"></div>
  </div>

  <script>
    const checkBtn = document.getElementById('checkBtn');
    const urlInput = document.getElementById('url');
    const resultDiv = document.getElementById('result');

    async function checkUrl() {
      const url = urlInput.value.trim();
      if (!url) {
        resultDiv.textContent = "Please enter a URL.";
        resultDiv.className = "phishing";
        return;
      }

      try {
        const resp = await fetch('http://127.0.0.1:5000/check_url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: "Server error" }));
          resultDiv.textContent = err.error || "Server returned an error.";
          resultDiv.className = "phishing";
          return;
        }

        const data = await resp.json();
        if (data.score >= 50) {
          resultDiv.className = "phishing";
        } else {
          resultDiv.className = "legitimate";
        }
        resultDiv.innerHTML = `Phishing probability: ${data.score.toFixed(1)}% <br> Prediction: ${data.prediction}`;
      } catch (e) {
        console.error(e);
        resultDiv.textContent = "Could not reach backend. Is it running?";
        resultDiv.className = "phishing";
      }
    }

    checkBtn.addEventListener('click', checkUrl);
    urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkUrl(); });
  </script>
</body>
